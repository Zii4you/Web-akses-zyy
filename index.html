<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Laporan Masalah</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#05050a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:25px;}
        .profil{background:rgba(0,255,255,0.08);border:1px solid #00fff5;border-radius:16px;padding:30px;text-align:center;width:100%;max-width:450px;box-shadow:0 0 25px rgba(0,255,245,0.2);}
        .avatar{width:90px;height:90px;border-radius:50%;border:3px solid #00fff5;margin:0 auto 15px;object-fit:cover;}
        .profil h2{color:#00fff5;font-size:26px;margin-bottom:5px;}
        .profil .info{color:#888;font-size:14px;}
        .form-panel{background:rgba(0,255,255,0.08);border:1px solid #00fff5;border-radius:16px;padding:30px;width:100%;max-width:450px;box-shadow:0 0 25px rgba(0,255,245,0.2);}
        .label{color:#00fff5;font-weight:bold;margin-bottom:10px;display:block;text-align:center;font-size:18px;}
        input,select{width:100%;padding:14px;border-radius:8px;border:1px solid rgba(0,255,245,0.4);background:rgba(0,0,0,0.5);color:#fff;font-size:15px;margin-bottom:20px;}
        input::placeholder{color:#555;}
        .btn{width:100%;padding:15px;border-radius:8px;border:none;background:linear-gradient(90deg,#00e0ff,#0099ff);color:#000;font-weight:bold;font-size:18px;cursor:pointer;transition:0.3s;}
        .btn:hover{transform:scale(1.02);box-shadow:0 0 15px rgba(0,224,255,0.5);}
    </style>
</head>
<body>
    <div class="profil">
        <img src="https://i.imgur.com/9Z7XzLb.png" alt="Logo" class="avatar">
        <h2>ZY SYSTEM</h2>
        <p class="info">Layanan Laporan Masalah Resmi</p>
    </div>

    <div class="form-panel">
        <label class="label">Nomor / ID Terkait</label>
        <input type="text" placeholder="Contoh: 0812xxxxxxx / ID Aplikasi">

        <label class="label">Jenis Masalah</label>
        <select>
            <option>Pilih Jenis Masalah...</option>
            <option>Kesalahan Tampilan</option>
            <option>Gagal Memuat Data</option>
            <option>Masalah Masuk Akun</option>
            <option>Lainnya</option>
        </select>

        <button class="btn" onclick="kirimLapor()">KIRIM LAPORAN</button>
    </div>

<script>
function kirimLapor(){
    alert('✅ Laporan terkirim! Tim kami akan segera memeriksa.');
}
</script>
</body>
</html>
